version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: goose-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  goose-aios:
    build: .
    container_name: goose-aios
    ports:
      - "8765:8765"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - AIOS_SAFETY_MODE=trusted_local
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - goose-conversations:/app/conversations
      - goose-knowledge:/app/knowledge
      - goose-memory:/app/memory

volumes:
  ollama-data:
  goose-conversations:
  goose-knowledge:
  goose-memory:
